<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Solar System</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas { display: block; }

    /* ── Top title bar ── */
    #title-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
      pointer-events: none;
      z-index: 20;
    }
    #title-bar h1 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 220, 100, 0.9);
    }
    #title-bar span {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
    }

    /* ── Speed control ── */
    #speed-wrap {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(10, 10, 20, 0.75);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 18px;
      border-radius: 30px;
      z-index: 20;
    }
    #speed-wrap label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    #speed-slider {
      width: 130px;
      accent-color: #ffcc44;
      cursor: pointer;
    }
    #speed-val {
      font-size: 12px;
      color: rgba(255,220,100,0.9);
      min-width: 32px;
      text-align: right;
    }

    /* ── Planet labels ── */
    #planet-labels {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
    }
    .plabel {
      position: absolute;
      color: rgba(255,255,255,0.65);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transform: translate(-50%, calc(-100% - 10px));
      text-shadow: 0 0 8px rgba(0,0,0,1), 0 0 4px rgba(0,0,0,1);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Hint ── */
    #hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      line-height: 1.8;
      text-align: right;
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="title-bar">
  <h1>☀ Solar System</h1>
  <span>·</span>
  <span>All 8 planets · Three.js</span>
</div>

<div id="speed-wrap">
  <label>Speed</label>
  <input type="range" id="speed-slider" min="0" max="5" step="0.05" value="1" />
  <span id="speed-val">1.0×</span>
</div>

<div id="hint">
  🖱 Drag to orbit<br>
  🔍 Scroll to zoom
</div>

<div id="planet-labels"></div>

<!-- Three.js r165 via importmap (ES modules, no build step) -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════
//  RENDERER & SCENE
// ═══════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type   = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 15000);
camera.position.set(0, 70, 200);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.minDistance    = 15;
controls.maxDistance    = 1200;
controls.target.set(0, 0, 0);
controls.update();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════
//  STARFIELD
// ═══════════════════════════════════════════════
{
  const count = 10000;
  const pos   = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 8000;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.8, sizeAttenuation: true, transparent: true, opacity: 0.9
  })));
}

// ═══════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════
// Ambient — keeps far planets visible
scene.add(new THREE.AmbientLight(0x111133, 1.0));

// Sun — main point light
const sunLight = new THREE.PointLight(0xfff5c0, 4.0, 1200, 1.5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
scene.add(sunLight);

// ═══════════════════════════════════════════════
//  SUN
// ═══════════════════════════════════════════════
const SUN_R = 8;

const sun = new THREE.Mesh(
  new THREE.SphereGeometry(SUN_R, 64, 64),
  new THREE.MeshStandardMaterial({
    color:             0xffdd22,
    emissive:          0xff8800,
    emissiveIntensity: 1.4,
    roughness:         0.6,
  })
);
scene.add(sun);

// Glow halos
[
  { r: SUN_R * 1.18, o: 0.14, c: 0xff9900 },
  { r: SUN_R * 1.38, o: 0.07, c: 0xff6600 },
  { r: SUN_R * 1.65, o: 0.03, c: 0xff4400 },
].forEach(({ r, o, c }) => {
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(r, 32, 32),
    new THREE.MeshBasicMaterial({
      color: c, transparent: true, opacity: o,
      side: THREE.BackSide, depthWrite: false
    })
  ));
});

// ═══════════════════════════════════════════════
//  PLANET DATA
//  Sizes scaled relative to Earth=1 (compressed
//  but proportionally correct).
//  Distances/periods use visual scale.
// ═══════════════════════════════════════════════
const EARTH_R = 1.6;   // visual Earth radius (scene units)

const PLANET_DATA = [
  {
    name:    'Mercury',
    rFactor: 0.38,
    dist:    28,
    period:  88,
    color:   0xb5b5b5, emissive: 0x1a1a1a,
    tilt:    0.03,
  },
  {
    name:    'Venus',
    rFactor: 0.95,
    dist:    42,
    period:  225,
    color:   0xe8cda0, emissive: 0x2a1800,
    tilt:    177.4,
  },
  {
    name:    'Earth',
    rFactor: 1.00,
    dist:    58,
    period:  365,
    color:   0x2255bb, emissive: 0x001133,
    tilt:    23.4,
    clouds:  true,
  },
  {
    name:    'Mars',
    rFactor: 0.53,
    dist:    78,
    period:  687,
    color:   0xcc4422, emissive: 0x1a0500,
    tilt:    25.2,
  },
  {
    name:    'Jupiter',
    rFactor: 3.50,   // ~11x Earth → scaled down to avoid dominating
    dist:    120,
    period:  4333,
    color:   0xc88b3a, emissive: 0x1a0800,
    tilt:    3.1,
    bands:   true,
  },
  {
    name:    'Saturn',
    rFactor: 2.95,
    dist:    165,
    period:  10759,
    color:   0xe4d191, emissive: 0x1a1700,
    tilt:    26.7,
    ring:    true,
  },
  {
    name:    'Uranus',
    rFactor: 1.85,
    dist:    210,
    period:  30687,
    color:   0x7de8e8, emissive: 0x002222,
    tilt:    97.8,
  },
  {
    name:    'Neptune',
    rFactor: 1.80,
    dist:    258,
    period:  60190,
    color:   0x3355cc, emissive: 0x000822,
    tilt:    28.3,
  },
];

// ═══════════════════════════════════════════════
//  BUILD ORBIT RINGS (flat rings on XZ plane)
// ═══════════════════════════════════════════════
function makeOrbitRing(r) {
  const geo = new THREE.RingGeometry(r - 0.06, r + 0.06, 160);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x3344aa, side: THREE.DoubleSide, transparent: true, opacity: 0.35
  });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  scene.add(m);
}

PLANET_DATA.forEach(d => makeOrbitRing(d.dist));

// ═══════════════════════════════════════════════
//  BUILD PLANETS
// ═══════════════════════════════════════════════
const planets  = [];
const labelDiv = document.getElementById('planet-labels');

PLANET_DATA.forEach((data, i) => {
  const radius = EARTH_R * data.rFactor;

  // ── Pivot for orbit
  const pivot = new THREE.Object3D();
  pivot.rotation.y = (i / PLANET_DATA.length) * Math.PI * 2; // stagger start angles
  scene.add(pivot);

  // ── Planet mesh
  const mat = new THREE.MeshStandardMaterial({
    color:    data.color,
    emissive: data.emissive,
    roughness: 0.82,
    metalness: 0.05,
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 64, 64), mat);
  mesh.castShadow    = true;
  mesh.receiveShadow = true;
  mesh.rotation.z    = THREE.MathUtils.degToRad(data.tilt);
  mesh.position.x    = data.dist;
  pivot.add(mesh);

  // ── Earth cloud layer
  if (data.clouds) {
    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(radius * 1.015, 48, 48),
      new THREE.MeshStandardMaterial({
        color: 0xffffff, transparent: true, opacity: 0.22,
        roughness: 1.0, depthWrite: false
      })
    );
    mesh.add(clouds);
    data._clouds = clouds;
  }

  // ── Jupiter atmospheric bands (torus rings)
  if (data.bands) {
    const bColors = [0xb87030, 0xd4a060, 0xa06020, 0xe0b878, 0xc09050];
    [-0.55, -0.28, 0, 0.28, 0.55].forEach((phi, bi) => {
      const band = new THREE.Mesh(
        new THREE.TorusGeometry(radius, radius * 0.06, 6, 64),
        new THREE.MeshBasicMaterial({
          color: bColors[bi], transparent: true, opacity: 0.28
        })
      );
      band.rotation.x = phi;
      mesh.add(band);
    });
  }

  // ── Saturn ring system
  if (data.ring) {
    // Main bright ring
    const ringA = buildSaturnRing(radius * 1.35, radius * 2.28, 0xd4b96a, 0.70);
    ringA.rotation.x = Math.PI / 2.15;
    mesh.add(ringA);
    // Outer faint ring
    const ringB = buildSaturnRing(radius * 2.38, radius * 2.75, 0xc0a050, 0.35);
    ringB.rotation.x = Math.PI / 2.15;
    mesh.add(ringB);
  }

  // ── Label
  const lbl = document.createElement('div');
  lbl.className   = 'plabel';
  lbl.textContent = data.name;
  labelDiv.appendChild(lbl);

  planets.push({ data, mesh, pivot, angle: pivot.rotation.y, label: lbl });
});

function buildSaturnRing(inner, outer, color, opacity) {
  const geo = new THREE.RingGeometry(inner, outer, 128);
  // Fix UVs for gradient rendering
  const pos = geo.attributes.position;
  const uv  = geo.attributes.uv;
  const v3  = new THREE.Vector3();
  for (let i = 0; i < pos.count; i++) {
    v3.fromBufferAttribute(pos, i);
    const t = (v3.length() - inner) / (outer - inner);
    uv.setXY(i, t, 0);
  }
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color, side: THREE.DoubleSide, transparent: true, opacity, depthWrite: false
  }));
}

// ═══════════════════════════════════════════════
//  SPEED CONTROL
// ═══════════════════════════════════════════════
const slider  = document.getElementById('speed-slider');
const valDisp = document.getElementById('speed-val');
let   SPEED   = 1.0;

slider.addEventListener('input', () => {
  SPEED = parseFloat(slider.value);
  valDisp.textContent = SPEED.toFixed(1) + '×';
});

// ═══════════════════════════════════════════════
//  LABEL PROJECTION
// ═══════════════════════════════════════════════
const _v3 = new THREE.Vector3();

function refreshLabels() {
  planets.forEach(p => {
    p.mesh.getWorldPosition(_v3);
    _v3.project(camera);
    if (_v3.z >= 1) {            // behind camera
      p.label.style.display = 'none';
      return;
    }
    p.label.style.display = 'block';
    p.label.style.left = ((  _v3.x * 0.5 + 0.5) * innerWidth)  + 'px';
    p.label.style.top  = (( -_v3.y * 0.5 + 0.5) * innerHeight) + 'px';
  });
}

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
const BASE_SPEED = 0.20;   // Earth completes ~1 rev per 365 "ticks"
const clock      = new THREE.Clock();

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();

  // Sun slow spin
  sun.rotation.y += dt * 0.08;

  planets.forEach(p => {
    // Orbital revolution (Kepler: speed ∝ 1/period)
    const dA = (BASE_SPEED / p.data.period) * dt * SPEED * 60;
    p.angle += dA;
    p.pivot.rotation.y = p.angle;

    // Self-rotation on local Y axis (after adding to pivot, need world-space spin)
    p.mesh.rotateOnWorldAxis(new THREE.Vector3(0,1,0), dt * 0.4 * SPEED);

    // Cloud drift
    if (p.data._clouds) {
      p.data._clouds.rotation.y += dt * 0.05 * SPEED;
    }
  });

  controls.update();
  renderer.render(scene, camera);
  refreshLabels();
});
</script>
</body>
</html>
