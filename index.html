<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      z-index: 10;
      user-select: none;
    }
    #ui h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f9c74f;
      margin-bottom: 4px;
    }
    #ui p {
      font-size: 11px;
      color: #aaa;
      line-height: 1.6;
    }

    #controls-hint {
      position: fixed;
      bottom: 16px;
      right: 16px;
      color: #666;
      font-size: 11px;
      text-align: right;
      z-index: 10;
      line-height: 1.8;
    }

    #speed-control {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      color: #fff;
      font-size: 12px;
    }
    #speed-control label {
      display: block;
      margin-bottom: 4px;
      color: #aaa;
      font-size: 11px;
    }
    #speed-slider {
      width: 160px;
      accent-color: #f9c74f;
    }

    #planet-labels {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 5;
    }
    .planet-label {
      position: absolute;
      color: #fff;
      font-size: 10px;
      font-family: 'Segoe UI', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(0,0,0,0.5);
      padding: 2px 5px;
      border-radius: 3px;
      transform: translate(-50%, -150%);
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>☀ Solar System</h1>
    <p>All 8 planets · Three.js</p>
  </div>

  <div id="controls-hint">
    🖱 Drag to rotate<br>
    🔍 Scroll to zoom<br>
    ⇧ Right-drag to pan
  </div>

  <div id="speed-control">
    <label>Orbit Speed</label>
    <input type="range" id="speed-slider" min="0" max="200" value="60" />
  </div>

  <div id="planet-labels"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─────────────────────────────────────────────
    // SCENE SETUP
    // ─────────────────────────────────────────────
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(0, 80, 160);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─────────────────────────────────────────────
    // ORBIT CONTROLS
    // ─────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 20;
    controls.maxDistance = 600;
    controls.target.set(0, 0, 0);

    // ─────────────────────────────────────────────
    // LIGHTING
    // ─────────────────────────────────────────────
    // Sun light — point light at origin
    const sunLight = new THREE.PointLight(0xfff5c0, 3.5, 800);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    scene.add(sunLight);

    // Soft ambient so far planets aren't totally black
    const ambientLight = new THREE.AmbientLight(0x111122, 0.8);
    scene.add(ambientLight);

    // ─────────────────────────────────────────────
    // STARS BACKGROUND
    // ─────────────────────────────────────────────
    function createStarfield(count = 8000) {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 4000;
      }
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, sizeAttenuation: true });
      return new THREE.Points(geo, mat);
    }
    scene.add(createStarfield());

    // ─────────────────────────────────────────────
    // SUN
    // ─────────────────────────────────────────────
    const sunGeo = new THREE.SphereGeometry(6, 64, 64);
    const sunMat = new THREE.MeshStandardMaterial({
      color: 0xffd000,
      emissive: 0xff8800,
      emissiveIntensity: 1.2,
      roughness: 0.5,
    });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    scene.add(sun);

    // Sun glow (outer emissive halo)
    const glowGeo = new THREE.SphereGeometry(7.2, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xff9900,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide,
    });
    const sunGlow = new THREE.Mesh(glowGeo, glowMat);
    scene.add(sunGlow);

    // ─────────────────────────────────────────────
    // PLANET DATA
    // ─────────────────────────────────────────────
    // Based on NASA Planetary Fact Sheet, scaled for visual clarity.
    // orbitRadius: compressed (true distances make inner planets invisible)
    // orbitalPeriod: Earth days (used to compute relative speeds)
    const PLANET_DATA = [
      {
        name: 'Mercury',
        radius: 0.38,
        orbitRadius: 10,
        orbitalPeriod: 88,
        color: 0xb5b5b5,
        emissive: 0x222222,
        tilt: 0.01,
        initialAngle: 0.5,
      },
      {
        name: 'Venus',
        radius: 0.95,
        orbitRadius: 15,
        orbitalPeriod: 225,
        color: 0xe8cda0,
        emissive: 0x332200,
        tilt: 177.4 * Math.PI / 180,
        initialAngle: 1.2,
      },
      {
        name: 'Earth',
        radius: 1.0,
        orbitRadius: 21,
        orbitalPeriod: 365,
        color: 0x2e6fdb,
        emissive: 0x001133,
        tilt: 23.5 * Math.PI / 180,
        initialAngle: 2.0,
      },
      {
        name: 'Mars',
        radius: 0.53,
        orbitRadius: 28,
        orbitalPeriod: 687,
        color: 0xc1440e,
        emissive: 0x220800,
        tilt: 25.2 * Math.PI / 180,
        initialAngle: 3.5,
      },
      {
        name: 'Jupiter',
        radius: 3.5,
        orbitRadius: 44,
        orbitalPeriod: 4333,
        color: 0xc88b3a,
        emissive: 0x221100,
        tilt: 3.1 * Math.PI / 180,
        initialAngle: 0.8,
      },
      {
        name: 'Saturn',
        radius: 3.0,
        orbitRadius: 60,
        orbitalPeriod: 10759,
        color: 0xe4d191,
        emissive: 0x221f00,
        tilt: 26.7 * Math.PI / 180,
        initialAngle: 4.2,
        hasRing: true,
      },
      {
        name: 'Uranus',
        radius: 1.8,
        orbitRadius: 76,
        orbitalPeriod: 30687,
        color: 0x7de8e8,
        emissive: 0x003333,
        tilt: 97.8 * Math.PI / 180,
        initialAngle: 1.9,
      },
      {
        name: 'Neptune',
        radius: 1.7,
        orbitRadius: 92,
        orbitalPeriod: 60190,
        color: 0x3f54ba,
        emissive: 0x000822,
        tilt: 28.3 * Math.PI / 180,
        initialAngle: 5.1,
      },
    ];

    // ─────────────────────────────────────────────
    // BUILD PLANETS + ORBIT RINGS
    // ─────────────────────────────────────────────
    const planets = [];

    // Label container
    const labelContainer = document.getElementById('planet-labels');

    PLANET_DATA.forEach(data => {
      // Orbit ring
      const ringGeo = new THREE.RingGeometry(data.orbitRadius - 0.06, data.orbitRadius + 0.06, 128);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0x444466,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.4,
      });
      const orbitRing = new THREE.Mesh(ringGeo, ringMat);
      orbitRing.rotation.x = -Math.PI / 2;
      scene.add(orbitRing);

      // Planet pivot (used for orbit)
      const pivot = new THREE.Object3D();
      pivot.rotation.y = data.initialAngle;
      scene.add(pivot);

      // Planet mesh
      const geo = new THREE.SphereGeometry(data.radius, 48, 48);
      const mat = new THREE.MeshStandardMaterial({
        color: data.color,
        emissive: data.emissive,
        roughness: 0.85,
        metalness: 0.05,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.rotation.z = data.tilt;
      mesh.position.x = data.orbitRadius;
      pivot.add(mesh);

      // Saturn's ring
      let saturnRing = null;
      if (data.hasRing) {
        const sRingGeo = new THREE.RingGeometry(data.radius * 1.4, data.radius * 2.4, 128);
        // Reorder UVs for RingGeometry so it renders correctly
        const pos = sRingGeo.attributes.position;
        const uv = sRingGeo.attributes.uv;
        const v3 = new THREE.Vector3();
        for (let i = 0; i < pos.count; i++) {
          v3.fromBufferAttribute(pos, i);
          uv.setXY(i, v3.length() < data.radius * 1.9 ? 0 : 1, 1);
        }
        const sRingMat = new THREE.MeshBasicMaterial({
          color: 0xd4c47a,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.65,
        });
        saturnRing = new THREE.Mesh(sRingGeo, sRingMat);
        saturnRing.rotation.x = Math.PI / 2.2;
        mesh.add(saturnRing);
      }

      // HTML label
      const label = document.createElement('div');
      label.className = 'planet-label';
      label.textContent = data.name;
      labelContainer.appendChild(label);

      planets.push({
        name: data.name,
        mesh,
        pivot,
        orbitRadius: data.orbitRadius,
        orbitalPeriod: data.orbitalPeriod,
        angle: data.initialAngle,
        label,
      });
    });

    // ─────────────────────────────────────────────
    // SPEED CONTROL
    // ─────────────────────────────────────────────
    const speedSlider = document.getElementById('speed-slider');
    let speedMultiplier = parseFloat(speedSlider.value);
    speedSlider.addEventListener('input', () => {
      speedMultiplier = parseFloat(speedSlider.value);
    });

    // ─────────────────────────────────────────────
    // LABEL PROJECTION HELPER
    // ─────────────────────────────────────────────
    const tempVec = new THREE.Vector3();

    function updateLabels() {
      planets.forEach(p => {
        // Get world position of planet mesh
        p.mesh.getWorldPosition(tempVec);
        tempVec.project(camera);

        const x = (tempVec.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-tempVec.y * 0.5 + 0.5) * window.innerHeight;

        // Hide if behind camera
        if (tempVec.z > 1) {
          p.label.style.display = 'none';
        } else {
          p.label.style.display = 'block';
          p.label.style.left = `${x}px`;
          p.label.style.top = `${y}px`;
        }
      });
    }

    // ─────────────────────────────────────────────
    // ANIMATION LOOP
    // ─────────────────────────────────────────────
    const clock = new THREE.Clock();

    renderer.setAnimationLoop(() => {
      const delta = clock.getDelta();
      const speed = speedMultiplier * 0.001;

      // Rotate sun
      sun.rotation.y += delta * 0.1;

      // Orbit + self-rotate each planet
      planets.forEach(p => {
        // Orbital speed: faster for inner planets (Kepler's law)
        const orbitSpeed = (2 * Math.PI / p.orbitalPeriod) * speed * 1000;
        p.angle += orbitSpeed * delta;
        p.pivot.rotation.y = p.angle;

        // Self-rotation (all rotate on Y in local space)
        p.mesh.rotation.y += delta * 0.5;
      });

      controls.update();
      updateLabels();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
