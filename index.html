<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Solar System</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Theme tokens ── */
    :root {
      --bg:            #000000;
      --ui-bg:         rgba(10, 10, 20, 0.75);
      --ui-border:     rgba(255,255,255,0.1);
      --label-color:   rgba(255,255,255,0.65);
      --label-shadow:  rgba(0,0,0,1);
      --title-color:   rgba(255, 220, 100, 0.9);
      --meta-color:    rgba(255,255,255,0.4);
      --ctrl-label:    rgba(255,255,255,0.5);
      --ctrl-val:      rgba(255,220,100,0.9);
      --hint-color:    rgba(255,255,255,0.3);
      --orbit-color:   #3344aa;
      --orbit-opacity: 0.35;
      --star-opacity:  0.9;
      --toggle-bg:     rgba(10,10,20,0.75);
      --toggle-icon:   '🌙';
    }

    [data-theme="light"] {
      --bg:            #d6e4f7;
      --ui-bg:         rgba(255,255,255,0.80);
      --ui-border:     rgba(0,0,0,0.12);
      --label-color:   rgba(20,20,60,0.85);
      --label-shadow:  rgba(200,220,255,0.9);
      --title-color:   #b35c00;
      --meta-color:    rgba(0,0,60,0.45);
      --ctrl-label:    rgba(0,0,60,0.55);
      --ctrl-val:      #b35c00;
      --hint-color:    rgba(0,0,60,0.35);
      --orbit-color:   #5566cc;
      --orbit-opacity: 0.25;
      --star-opacity:  0.0;
      --toggle-bg:     rgba(255,255,255,0.80);
      --toggle-icon:   '☀';
    }

    body {
      background: var(--bg);
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: background 0.4s;
    }

    canvas { display: block; }

    /* ── Top title bar ── */
    #title-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
      pointer-events: none;
      z-index: 20;
    }
    [data-theme="light"] #title-bar {
      background: linear-gradient(to bottom, rgba(200,220,255,0.55) 0%, transparent 100%);
    }
    #title-bar h1 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--title-color);
    }
    #title-bar span {
      font-size: 11px;
      color: var(--meta-color);
      letter-spacing: 0.1em;
    }

    /* ── Speed control ── */
    #speed-wrap {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      padding: 8px 18px;
      border-radius: 30px;
      z-index: 20;
      backdrop-filter: blur(6px);
      transition: background 0.4s, border-color 0.4s;
    }
    #speed-wrap label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ctrl-label);
    }
    #speed-slider {
      width: 130px;
      accent-color: #ffcc44;
      cursor: pointer;
    }
    #speed-val {
      font-size: 12px;
      color: var(--ctrl-val);
      min-width: 32px;
      text-align: right;
    }

    /* ── Planet labels ── */
    #planet-labels {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
    }
    .plabel {
      position: absolute;
      color: var(--label-color);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transform: translate(-50%, calc(-100% - 10px));
      text-shadow: 0 0 8px var(--label-shadow), 0 0 4px var(--label-shadow);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Hint ── */
    #hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: var(--hint-color);
      font-size: 10px;
      line-height: 1.8;
      text-align: right;
      z-index: 20;
      pointer-events: none;
    }

    /* ── Theme toggle button ── */
    #theme-toggle {
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 30;
      background: var(--toggle-bg);
      border: 1px solid var(--ui-border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      backdrop-filter: blur(6px);
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
      user-select: none;
    }
    #theme-toggle:hover { transform: scale(1.12); }
    #theme-toggle:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div id="title-bar">
  <h1>☀ Solar System</h1>
  <span>·</span>
  <span>All 8 planets · Three.js</span>
</div>

<button id="theme-toggle" title="Toggle dark / light mode">🌙</button>

<div id="speed-wrap">
  <label>Speed</label>
  <input type="range" id="speed-slider" min="0" max="5" step="0.05" value="1" />
  <span id="speed-val">1.0×</span>
</div>

<div id="hint">
  🖱 Drag to orbit<br>
  🔍 Scroll to zoom
</div>

<div id="planet-labels"></div>

<!-- Three.js r165 via importmap (ES modules, no build step) -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════
//  THEME STATE
// ═══════════════════════════════════════════════
const html = document.documentElement;
const toggleBtn = document.getElementById('theme-toggle');
let isDark = true;

// Scene background colours
const DARK_BG  = new THREE.Color(0x000000);
const LIGHT_BG = new THREE.Color(0xc8dcf7);

toggleBtn.addEventListener('click', () => {
  isDark = !isDark;
  html.dataset.theme = isDark ? 'dark' : 'light';
  toggleBtn.textContent = isDark ? '🌙' : '☀️';

  // Update Three.js scene bg + fog
  renderer.setClearColor(isDark ? DARK_BG : LIGHT_BG, 1);
  scene.background = isDark ? DARK_BG : LIGHT_BG;
  scene.fog = isDark
    ? new THREE.FogExp2(0x000000, 0.00008)
    : new THREE.Fog(LIGHT_BG, 600, 1400);

  // Starfield visibility
  stars.material.opacity = isDark ? 0.9 : 0.0;

  // Orbit ring colours
  orbitRings.forEach(r => {
    r.material.color.set(isDark ? 0x3344aa : 0x5566cc);
    r.material.opacity = isDark ? 0.35 : 0.25;
  });

  // Ambient light
  ambientLight.color.set(isDark ? 0x111133 : 0x556688);
  ambientLight.intensity = isDark ? 1.0 : 2.5;

  // Sun brightness
  sunLight.intensity = isDark ? 4.0 : 2.8;
});

// ═══════════════════════════════════════════════
//  RENDERER & SCENE
// ═══════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(DARK_BG, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

const scene  = new THREE.Scene();
scene.background = DARK_BG;
scene.fog = new THREE.FogExp2(0x000000, 0.00008);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 15000);
camera.position.set(0, 70, 200);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.minDistance    = 15;
controls.maxDistance    = 1200;
controls.target.set(0, 0, 0);
controls.update();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════
//  STARFIELD
// ═══════════════════════════════════════════════
let stars;
{
  const count = 10000;
  const pos   = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 8000;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  stars = new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.8, sizeAttenuation: true, transparent: true, opacity: 0.9
  }));
  scene.add(stars);
}

// ═══════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════
const ambientLight = new THREE.AmbientLight(0x111133, 1.0);
scene.add(ambientLight);

const sunLight = new THREE.PointLight(0xfff5c0, 4.0, 1200, 1.5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
scene.add(sunLight);

// ═══════════════════════════════════════════════
//  SUN
// ═══════════════════════════════════════════════
const SUN_R = 8;

const sun = new THREE.Mesh(
  new THREE.SphereGeometry(SUN_R, 64, 64),
  new THREE.MeshStandardMaterial({
    color:             0xffdd22,
    emissive:          0xff8800,
    emissiveIntensity: 1.4,
    roughness:         0.6,
  })
);
scene.add(sun);

[
  { r: SUN_R * 1.18, o: 0.14, c: 0xff9900 },
  { r: SUN_R * 1.38, o: 0.07, c: 0xff6600 },
  { r: SUN_R * 1.65, o: 0.03, c: 0xff4400 },
].forEach(({ r, o, c }) => {
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(r, 32, 32),
    new THREE.MeshBasicMaterial({
      color: c, transparent: true, opacity: o,
      side: THREE.BackSide, depthWrite: false
    })
  ));
});

// ═══════════════════════════════════════════════
//  PLANET DATA
// ═══════════════════════════════════════════════
const EARTH_R = 1.6;

const PLANET_DATA = [
  {
    name:    'Mercury',
    rFactor: 0.38,
    dist:    28,
    period:  88,
    color:   0xb5b5b5, emissive: 0x1a1a1a,
    tilt:    0.03,
  },
  {
    name:    'Venus',
    rFactor: 0.95,
    dist:    42,
    period:  225,
    color:   0xe8cda0, emissive: 0x2a1800,
    tilt:    177.4,
  },
  {
    name:    'Earth',
    rFactor: 1.00,
    dist:    58,
    period:  365,
    color:   0x2255bb, emissive: 0x001133,
    tilt:    23.4,
    clouds:  true,
  },
  {
    name:    'Mars',
    rFactor: 0.53,
    dist:    78,
    period:  687,
    color:   0xcc4422, emissive: 0x1a0500,
    tilt:    25.2,
  },
  {
    name:    'Jupiter',
    rFactor: 3.50,
    dist:    120,
    period:  4333,
    color:   0xc88b3a, emissive: 0x1a0800,
    tilt:    3.1,
    bands:   true,
  },
  {
    name:    'Saturn',
    rFactor: 2.95,
    dist:    165,
    period:  10759,
    color:   0xe4d191, emissive: 0x1a1700,
    tilt:    26.7,
    ring:    true,
  },
  {
    name:    'Uranus',
    rFactor: 1.85,
    dist:    210,
    period:  30687,
    color:   0x7de8e8, emissive: 0x002222,
    tilt:    97.8,
  },
  {
    name:    'Neptune',
    rFactor: 1.80,
    dist:    258,
    period:  60190,
    color:   0x3355cc, emissive: 0x000822,
    tilt:    28.3,
  },
];

// ═══════════════════════════════════════════════
//  ORBIT RINGS
// ═══════════════════════════════════════════════
const orbitRings = [];
function makeOrbitRing(r) {
  const geo = new THREE.RingGeometry(r - 0.06, r + 0.06, 160);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x3344aa, side: THREE.DoubleSide, transparent: true, opacity: 0.35
  });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  scene.add(m);
  orbitRings.push(m);
}
PLANET_DATA.forEach(d => makeOrbitRing(d.dist));

// ═══════════════════════════════════════════════
//  BUILD PLANETS
// ═══════════════════════════════════════════════
const planets  = [];
const labelDiv = document.getElementById('planet-labels');

PLANET_DATA.forEach((data, i) => {
  const radius = EARTH_R * data.rFactor;

  const pivot = new THREE.Object3D();
  pivot.rotation.y = (i / PLANET_DATA.length) * Math.PI * 2;
  scene.add(pivot);

  const mat = new THREE.MeshStandardMaterial({
    color:    data.color,
    emissive: data.emissive,
    roughness: 0.82,
    metalness: 0.05,
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 64, 64), mat);
  mesh.castShadow    = true;
  mesh.receiveShadow = true;
  mesh.rotation.z    = THREE.MathUtils.degToRad(data.tilt);
  mesh.position.x    = data.dist;
  pivot.add(mesh);

  if (data.clouds) {
    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(radius * 1.015, 48, 48),
      new THREE.MeshStandardMaterial({
        color: 0xffffff, transparent: true, opacity: 0.22,
        roughness: 1.0, depthWrite: false
      })
    );
    mesh.add(clouds);
    data._clouds = clouds;
  }

  if (data.bands) {
    const bColors = [0xb87030, 0xd4a060, 0xa06020, 0xe0b878, 0xc09050];
    [-0.55, -0.28, 0, 0.28, 0.55].forEach((phi, bi) => {
      const band = new THREE.Mesh(
        new THREE.TorusGeometry(radius, radius * 0.06, 6, 64),
        new THREE.MeshBasicMaterial({
          color: bColors[bi], transparent: true, opacity: 0.28
        })
      );
      band.rotation.x = phi;
      mesh.add(band);
    });
  }

  if (data.ring) {
    const ringA = buildSaturnRing(radius * 1.35, radius * 2.28, 0xd4b96a, 0.70);
    ringA.rotation.x = Math.PI / 2.15;
    mesh.add(ringA);
    const ringB = buildSaturnRing(radius * 2.38, radius * 2.75, 0xc0a050, 0.35);
    ringB.rotation.x = Math.PI / 2.15;
    mesh.add(ringB);
  }

  const lbl = document.createElement('div');
  lbl.className   = 'plabel';
  lbl.textContent = data.name;
  labelDiv.appendChild(lbl);

  planets.push({ data, mesh, pivot, angle: pivot.rotation.y, label: lbl });
});

function buildSaturnRing(inner, outer, color, opacity) {
  const geo = new THREE.RingGeometry(inner, outer, 128);
  const pos = geo.attributes.position;
  const uv  = geo.attributes.uv;
  const v3  = new THREE.Vector3();
  for (let i = 0; i < pos.count; i++) {
    v3.fromBufferAttribute(pos, i);
    const t = (v3.length() - inner) / (outer - inner);
    uv.setXY(i, t, 0);
  }
  uv.needsUpdate = true;
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color, side: THREE.DoubleSide, transparent: true, opacity, depthWrite: false
  }));
}

// ═══════════════════════════════════════════════
//  SPEED CONTROL
// ═══════════════════════════════════════════════
const slider  = document.getElementById('speed-slider');
const valDisp = document.getElementById('speed-val');
let   SPEED   = 1.0;

slider.addEventListener('input', () => {
  SPEED = parseFloat(slider.value);
  valDisp.textContent = SPEED.toFixed(1) + '×';
});

// ═══════════════════════════════════════════════
//  LABEL PROJECTION
// ═══════════════════════════════════════════════
const _v3  = new THREE.Vector3();
const _UP  = new THREE.Vector3(0, 1, 0);

function refreshLabels() {
  planets.forEach(p => {
    p.mesh.getWorldPosition(_v3);
    _v3.project(camera);
    if (_v3.z >= 1) {
      p.label.style.display = 'none';
      return;
    }
    p.label.style.display = 'block';
    p.label.style.left = (( _v3.x * 0.5 + 0.5) * innerWidth)  + 'px';
    p.label.style.top  = ((-_v3.y * 0.5 + 0.5) * innerHeight) + 'px';
  });
}

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
const BASE_SPEED = 0.20;
const clock      = new THREE.Clock();

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();

  sun.rotation.y += dt * 0.08;

  planets.forEach(p => {
    const dA = (BASE_SPEED / p.data.period) * dt * SPEED * 60;
    p.angle += dA;
    p.pivot.rotation.y = p.angle;
    p.mesh.rotateOnWorldAxis(_UP, dt * 0.4 * SPEED);
    if (p.data._clouds) {
      p.data._clouds.rotation.y += dt * 0.05 * SPEED;
    }
  });

  controls.update();
  renderer.render(scene, camera);
  refreshLabels();
});
</script>
</body>
</html>
